<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce Store</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'store/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="hero-section">

    <div class="overlay">

        <div class="navbar">

            <h2 class="logo">Store</h2>

            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/register/">Register</a>
                <a href="/login/">Login</a>
                <a href="/cart/">Cart</a>
                <a href="/logout/">Logout</a>
            </div>

        </div>

        <div class="hero-content">
            <h1>Welcome To Shopping</h1>
            <p>Discover amazing products with modern shopping experience.</p>
        </div>

    </div>

</div>

<h1 class="products-title">Our Products</h1>

<div class="products-container">

{% for product in products %}

    <div class="product-card">

        <img src="/products/mango.png" alt="Product Image">

        <h2>{{ product.name }}</h2>

        <p class="price">₹ {{ product.price }}</p>

        <a class="details-btn" href="{% url 'product_detail' product.id %}">
            View Details
        </a>

    </div>

{% endfor %}

</div>

</body>
</html>
